version: "3.9"

services:
  dockdash:
    image: ghcr.io/lilithson/dockdash:latest
    # To build locally instead of pulling:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: dockdash
    restart: unless-stopped
    ports:
      - "9000:9000"
    volumes:
      # Mount the Docker socket so DockDash can manage containers and stacks.
      # Write access is required for docker compose stack deployments.
      - /var/run/docker.sock:/var/run/docker.sock
      # Persistent data: SQLite DB, stack YAMLs, templates
      - dockdash_data:/data
    environment:
      # Strongly recommended: set a long random string as JWT secret.
      # Generate one with: openssl rand -hex 32
      - JWT_SECRET=${JWT_SECRET:-change_me_in_production}
      - PORT=9000
      - DATA_DIR=/data
    # The container user (dockdash, UID 1000) needs access to the Docker
    # socket group. Ensure the host docker group GID matches 999, or override:
    # group_add:
    #   - "999"
    # For security on a LAN, bind only to a specific interface:
    # ports:
    #   - "192.168.1.x:9000:9000"

volumes:
  dockdash_data:
    driver: local
