# Nginx Web Server
name: nginx
description: A high-performance HTTP server and reverse proxy
image: nginx:latest
category: Web Server
ports:
  - host: 80
    container: 80
  - host: 443
    container: 443
volumes:
  - host: /opt/nginx/html
    container: /usr/share/nginx/html
  - host: /opt/nginx/conf
    container: /etc/nginx/conf.d
restart_policy: unless-stopped
env:
  - name: NGINX_HOST
    value: "localhost"
    description: "Virtual host name"
